name: Update funding snapshot

on:
  schedule:
    # 00:30 / 08:30 / 16:30 UTC — half hour after funding settlement so all venues have posted
    - cron: "30 0,8,16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-funding
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener
        run: python screener.py

      - name: Commit and push if changed
        run: |
          git config user.name  "ruleaker"
          git config user.email "ruleaker@yeah.net"
          git add README.md data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          stamp=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "chore: refresh funding snapshot (${stamp})"
          git push
